<div id="pending-requests" class="glass border border-amber-200 dark:border-amber-800/50 rounded-2xl p-6 bg-amber-50/50 dark:bg-amber-900/10">
  <h3 class="font-bold text-lg mb-4 text-amber-800 dark:text-amber-400 flex items-center gap-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
    Pending Join Requests ({{ pending_requests|length }})
  </h3>
  <div class="space-y-3">
    {% for jr in pending_requests %}
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800">
      <div>
        <p class="font-semibold text-sm">{{ jr.tenant.full_name }}</p>
        <p class="text-xs text-slate-500 dark:text-slate-400">{{ jr.tenant.email }} · Apt: <span class="font-mono">{{ jr.apartment.apartment_code }}</span> ({{ jr.apartment.apartment_name }})</p>
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button hx-post="{% url 'properties:join_request_approve' jr.pk %}" hx-target="#pending-requests" hx-swap="outerHTML" class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-xs font-bold transition-all">Approve</button>
        <button hx-post="{% url 'properties:join_request_reject' jr.pk %}" hx-target="#pending-requests" hx-swap="outerHTML" class="px-4 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-xs font-bold transition-all">Reject</button>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
