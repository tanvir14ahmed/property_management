{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto space-y-8 animate-slide-up">
  <div class="glass border border-slate-200 dark:border-slate-800 rounded-3xl p-8">
    <div class="flex items-center gap-4 mb-6">
      <div class="h-12 w-12 rounded-xl bg-brand-100 dark:bg-brand-900/30 flex items-center justify-center">
        <svg class="w-6 h-6 text-brand-600 dark:text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <div>
        <h2 class="text-2xl font-black tracking-tight">Upload Lease Document</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">For {{ tenant.full_name }} in {{ apartment.apartment_name }}</p>
      </div>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-6">
      {% csrf_token %}
      
      <div class="space-y-2">
        <label for="id_lease_document" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Select PDF File</label>
        <input type="file" name="lease_document" id="id_lease_document" accept="application/pdf" class="block w-full text-sm text-slate-500 dark:text-slate-400
          file:mr-4 file:py-2.5 file:px-5
          file:rounded-xl file:border-0
          file:text-sm file:font-semibold
          file:bg-brand-50 file:text-brand-700
          hover:file:bg-brand-100
          dark:file:bg-brand-900/30 dark:file:text-brand-400 dark:hover:file:bg-brand-900/50
          transition-colors cursor-pointer" required>
        {% if form.lease_document.errors %}
          <p class="text-rose-500 text-xs font-semibold mt-1">{{ form.lease_document.errors.0 }}</p>
        {% endif %}
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-brand-500/25 transition-all">Upload Document</button>
        <a href="{% url 'properties:apartment_detail' apartment.pk %}" class="px-5 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-bold text-sm transition-all text-center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
