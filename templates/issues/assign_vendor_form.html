{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto space-y-8 animate-slide-up">
  <div class="glass border border-slate-200 dark:border-slate-800 rounded-3xl p-8">
    <div class="flex items-center gap-4 mb-6">
      <div class="h-12 w-12 rounded-xl bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center">
        <svg class="w-6 h-6 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      </div>
      <div>
        <h2 class="text-2xl font-black tracking-tight">Assign Vendor</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">Assign a professional to "{{ object.title }}"</p>
      </div>
    </div>

    <form method="post" class="space-y-6">
      {% csrf_token %}
      
      <div>
        <label for="{{ form.vendor.id_for_label }}" class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Select Vendor</label>
        {{ form.vendor }}
        <script>
          const select = document.getElementById("{{ form.vendor.id_for_label }}");
          if(select) {
            select.className = "w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 px-4 py-2 text-sm focus:border-brand-500 focus:ring-brand-500";
          }
        </script>
        {% if form.vendor.errors %}<p class="text-rose-500 text-xs font-semibold mt-1">{{ form.vendor.errors.0 }}</p>{% endif %}
      </div>
      
      <p class="text-xs text-slate-500 dark:text-slate-400">Can't find the right person? <a href="{% url 'issues:vendor_create' %}" class="text-brand-600 dark:text-brand-400 font-bold hover:underline">Add a new vendor</a>.</p>

      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-brand-500/25 transition-all">Assign Vendor</button>
        <a href="{% url 'issues:list' %}" class="px-5 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-bold text-sm transition-all text-center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
